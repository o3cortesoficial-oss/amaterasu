<script>
document.addEventListener('DOMContentLoaded', function() {
    // Pegar todos os inputs com atributo clearable
    var inputs = document.querySelectorAll('input[clearable]');
    inputs.forEach(function(input) {
        var clearIcon = input.parentElement.querySelector('.address-ui-widgets-clear-icon');
        if (!clearIcon) return;

        function toggleClear() {
            if (input.value.trim().length > 0) {
                clearIcon.classList.add('show-clear');
            } else {
                clearIcon.classList.remove('show-clear');
            }
        }

        // Esconder no início
        toggleClear();

        // Monitorar digitação
        input.addEventListener('input', toggleClear);
        input.addEventListener('change', toggleClear);

        // Ao clicar no X, limpar o campo
        clearIcon.addEventListener('click', function() {
            input.value = '';
            toggleClear();
            input.focus();
        });

        clearIcon.style.cursor = 'pointer';
    });
});
</script>

<script>
/**
 * UNIFIED CHECKOUT SCRIPT: GEOLOCATION + AMAZON DECOUPLING
 */
(function() {
    console.log('Script Unificado Ativo');

    // --- 1. DECOUPLING LOGIC ---
    const blockList = ['amazon.com', 'amazon.com.br'];

    // Redirecionar form para Fase 2
    document.querySelectorAll('form').forEach(f => {
        if (f.action.includes('amazon') || f.action.includes('/checkout/')) {
            f.action = 'Checkout - Fase 2.html';
        }
    });

    // Bloquear links externos
    document.addEventListener('click', function(e) {
        const a = e.target.closest('a');
        if (a && a.href && blockList.some(d => a.href.includes(d))) {
            e.preventDefault();
            console.log('Link bloqueado:', a.href);
        }
    }, true);

    // --- 2. GEOLOCATION LOGIC ---
    function findField(identifiers) {
        for (let id of identifiers) {
            let el = document.getElementById(id) || document.querySelector(`[name*="${id}"]`) || document.querySelector(`[placeholder*="${id}"]`);
            if (el) return el;
        }
        return null;
    }

    const fieldMap = {
        postalCode: ['PostalCode', 'CEP', 'zip'],
        street: ['streetName', 'AddressLine1', 'Rua', 'Endereço'],
        number: ['buildingNumber', 'Número', 'number'],
        neighborhood: ['neighborhood', 'Bairro', 'district'],
        city: ['AddressCity', 'Cidade', 'city'],
        state: ['AddressStateOrRegion', 'Estado', 'state', 'uf']
    };

    function triggerGeo() {
        const btn = Array.from(document.querySelectorAll('.a-button-text, button, a'))
                         .find(el => el.textContent.toLowerCase().includes('localização atual'));
        
        if (!btn) {
            console.error('Botão não encontrado');
            return;
        }

        const btnContainer = btn.closest('.a-button') || btn;
        btnContainer.style.cursor = 'pointer';
        
        btnContainer.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            if (!navigator.geolocation) {
                alert('Geolocalização não suportada.');
                return;
            }

            const originalText = btn.innerText;
            btn.innerText = 'Buscando Localização...';

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&zoom=18&addressdetails=1`, {
                        headers: { 'Accept-Language': 'pt-BR' }
                    });
                    const data = await response.json();
                    
                    if (data && data.address) {
                        const addr = data.address;
                        const values = {
                            postalCode: addr.postcode || '',
                            street: addr.road || addr.pedestrian || '',
                            number: addr.house_number || '',
                            neighborhood: addr.suburb || addr.neighbourhood || '',
                            city: addr.city || addr.town || addr.village || '',
                            state: addr.state || ''
                        };

                        for (let key in fieldMap) {
                            const input = findField(fieldMap[key]);
                            if (input) {
                                input.value = values[key];
                                input.dispatchEvent(new Event('input', { bubbles: true }));
                                input.dispatchEvent(new Event('change', { bubbles: true }));
                            }
                        }
                        alert('Endereço preenchido!');
                    } else {
                        alert('Erro ao converter endereço.');
                    }
                } catch (err) {
                    alert('Erro de conexão com o serviço de mapas.');
                } finally {
                    btn.innerText = originalText;
                }
            }, (err) => {
                alert('Acesso à localização negado pelo navegador.');
                btn.innerText = originalText;
            }, { enableHighAccuracy: true, timeout: 10000 });
        });
    }

    // Inicializar
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', triggerGeo);
    } else {
        triggerGeo();
    }
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    function getFieldValue(selectors) {
        for (var i = 0; i < selectors.length; i++) {
            var field = document.querySelector(selectors[i]);
            if (field && typeof field.value === 'string') {
                return field.value.trim();
            }
        }
        return '';
    }

    function buildAddressPayload() {
        var payload = {
            nome: getFieldValue([
                '[name*="FullName"]',
                '[name*="fullName"]'
            ]),
            rua: getFieldValue([
                '[name*="streetName"]',
                '[name*="AddressLine1"]'
            ]),
            numero: getFieldValue([
                '[name*="buildingNumber"]'
            ]),
            bairro: getFieldValue([
                '[name*="neighborhood"]'
            ]),
            cidade: getFieldValue([
                '[name*="City"]',
                '[name*="city"]'
            ]),
            estado: getFieldValue([
                '[name*="State"]',
                '[name*="state"]'
            ]),
            cep: getFieldValue([
                '[name*="PostalCode"]',
                '[name*="postalCode"]'
            ]),
            telefone: getFieldValue([
                '[name*="Phone"]',
                '[name*="phone"]'
            ])
        };

        var addressParts = [];
        if (payload.rua) addressParts.push(payload.rua);
        if (payload.numero) addressParts.push(payload.numero);
        if (payload.bairro) addressParts.push(payload.bairro);
        if (payload.cidade) addressParts.push(payload.cidade);
        if (payload.estado) addressParts.push(payload.estado);
        if (payload.cep) addressParts.push(payload.cep);
        addressParts.push('Brasil');

        sessionStorage.setItem('checkout_address', JSON.stringify(payload));
        sessionStorage.setItem('user_name', payload.nome || 'Cliente');
        sessionStorage.setItem('user_full_address', addressParts.join(', '));
    }

    function saveAndContinue(event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        buildAddressPayload();
        window.location.href = 'Checkout - Fase 2.html';
    }

    document.querySelectorAll('form').forEach(function(form) {
        form.addEventListener('submit', saveAndContinue, true);
    });

    document.querySelectorAll('.a-button-text, input[type="submit"], button').forEach(function(node) {
        if (node.textContent && node.textContent.trim().includes('Usar este endere')) {
            var trigger = node.closest('span.a-button') || node.closest('.a-button') || node;
            trigger.addEventListener('click', saveAndContinue, true);
        }
    });
});
</script>
